name: Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build APK
        run: gradle :app:assembleRelease

      - name: Prepare APK asset
        run: |
          mkdir -p dist
          apk_path="$(find app/build/outputs/apk -name '*.apk' | head -n 1)"
          cp "$apk_path" dist/readalong-arm64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: readalong-arm64-apk
          path: dist/readalong-arm64.apk
          if-no-files-found: error

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --target "$GITHUB_SHA" \
              --title "Latest Read Along APK" \
              --notes "Automated APK build for commit $GITHUB_SHA." \
              --latest
            gh release upload latest dist/readalong-arm64.apk --clobber
          else
            gh release create latest dist/readalong-arm64.apk \
              --target "$GITHUB_SHA" \
              --title "Latest Read Along APK" \
              --notes "Automated APK build for commit $GITHUB_SHA." \
              --latest
          fi
